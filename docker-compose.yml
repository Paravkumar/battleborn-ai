services:
  battleborn-customer-support-ai:
    build: .
    container_name: battleborn-customer-support-ai
    environment:
      - OPENAI_API_KEY=your-openai-api-key-here
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_STUDENT_MODEL=llama3.1:70b
    stdin_open: true
    ports:
      - "5000:5000"
    tty: true
    networks:
      - agents-net

networks:
  agents-net:
    external: true

